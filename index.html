<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanVids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #141414;
      --surface: #1f1f1f;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text-primary: #f5f5f5;
      --text-secondary: #b3b3b3;
      --text-muted: #777;
      --accent: #e50914;
      --accent-dark: #b00610;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      color: var(--text-primary);
    }

    .page { width: 100%; max-width: 480px; }

    /* === PERFIL === */
    .profile { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .avatar {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, #1a1a1a 0%, #2b0405 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 600; color: #fff;
      border: 3px solid var(--accent);
      letter-spacing: -1px;
    }
    .profile h1 { font-size: 22px; font-weight: 600; text-align: center; letter-spacing: -0.02em; }
    .profile p { font-size: 14px; color: var(--text-secondary); text-align: center; max-width: 320px; line-height: 1.5; }

    /* === SEÇÕES === */
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.09em;
      margin: 1.75rem 0 0.75rem;
    }

    /* === PLANOS === */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.25rem 1rem;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
    }
    .plan-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
    .plan-card:active { transform: scale(0.99); }
    .plan-card.featured { border: 2px solid var(--accent); }
    .promo-tag {
      position: absolute; top: -11px; right: 1.25rem;
      background: #2b0405; color: #ff8a8f;
      border: 1px solid var(--accent);
      font-size: 10.5px; font-weight: 600;
      padding: 2px 9px; border-radius: 20px;
      white-space: nowrap;
    }
    .popular-tag {
      position: absolute; top: -11px; left: 1.25rem;
      background: var(--accent); color: #fff;
      font-size: 11px; font-weight: 600;
      padding: 2px 10px; border-radius: 20px;
    }
    .plan-left { display: flex; align-items: center; gap: 12px; }
    .plan-icon {
      width: 42px; height: 42px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      background: rgba(229,9,20,0.15);
    }
    .plan-info h3 { font-size: 15px; font-weight: 500; }
    .plan-info p  { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .plan-price { text-align: right; }
    .plan-price .amount-old { font-size: 13px; color: var(--text-muted); text-decoration: line-through; }
    .plan-price .amount { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .plan-price .period { font-size: 12px; color: var(--text-muted); }

    /* === BOTÕES DE LINK === */
    .link-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 0.85rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      cursor: pointer; text-decoration: none; color: var(--text-primary);
      font-size: 15px; font-weight: 400;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .link-btn:hover  { border-color: var(--border-strong); background: #262626; }
    .link-btn:active { transform: scale(0.99); }
    .link-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      background: rgba(229,9,20,0.15);
    }
    .link-arrow { margin-left: auto; color: var(--text-muted); font-size: 14px; }

    /* === GERADOR === */
    .gen-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: 0.75rem;
    }
    .gen-box h3 { font-size: 14px; font-weight: 500; margin-bottom: 0.75rem; }
    .gen-row { display: flex; gap: 8px; }
    .gen-row input {
      flex: 1; font-size: 14px; font-family: inherit;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .gen-row input:focus { border-color: var(--accent); }
    .gen-row input::placeholder { color: var(--text-muted); }
    .gen-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 9px 16px; font-size: 14px; font-family: inherit;
      cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .gen-btn:hover { opacity: 0.85; }

    .result-link {
      display: none; margin-top: 10px;
      font-size: 12px; color: #ff8a8f;
      background: rgba(229,9,20,0.12);
      border-radius: 8px; padding: 8px 12px;
      word-break: break-all; cursor: pointer;
      line-height: 1.5;
    }
    .result-link:hover { background: rgba(229,9,20,0.2); }

    /* === DIVIDER === */
    hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* === FOOTER === */
    .footer { text-align: center; margin-top: 2.5rem; font-size: 12px; color: var(--text-muted); }

    /* === TOAST === */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff;
      padding: 9px 20px; border-radius: 24px;
      font-size: 13px; opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 420px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      .plan-price .amount { font-size: 19px; }
    }
  </style>
</head>
<body>

<!-- ============================================================
  ✏️  CONFIGURE AQUI SUAS INFORMAÇÕES
============================================================ -->
<script>
  var CONFIG = {
    nome:        "CleanVids",
    bio:         "Explore milhares de filmes, séries, documentários e lançamentos em alta qualidade, disponíveis para assistir quando quiser.",
    avatarLetra: "C",

    // Pagamentos
    pixChave:    "698d78fd-6fc8-4397-a1e9-19af552d00dd",

    // Comunicação
    whatsapp:    "5533999670316",

    // Planos
    planos: [
      { id: "mensal-simples", emoji: "🎬", nome: "Mensal Simples",        desc: "Acesso completo ao catálogo",          precoDe: "30", preco: "13", destaque: false },
      { id: "mensal-onlyfans", emoji: "🔥", nome: "Mensal com Onlyfans",  desc: "Catálogo completo + conteúdo extra",    precoDe: "45", preco: "17", destaque: true  }
    ],

    // Base de geração de links (seu site ou sistema de cobrança)
    baseLink: "https://seusite.com.br/pagar"
  };
</script>
<!-- ============================================================ -->

<div class="page" id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function() {
  var c = CONFIG;

  /* toast */
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(function() { el.classList.remove('show'); }, 2300);
  }

  function copyText(text, label) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { toast(label || 'Copiado!'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      toast(label || 'Copiado!');
    }
  }

  /* link do whatsapp com mensagem do plano escolhido */
  function linkWhatsPlano(nome, preco) {
    var msg = 'Olá! Quero assinar o plano *' + nome + '* (R$' + preco + '/mês).\n\n'
            + 'Já fiz o Pix para a chave: ' + c.pixChave + '\n'
            + 'Vou enviar o comprovante aqui!';
    return 'https://wa.me/' + c.whatsapp + '?text=' + encodeURIComponent(msg);
  }

  /* === HTML dos planos === */
  var planosHTML = c.planos.map(function(p) {
    return '<a class="plan-card' + (p.destaque ? ' featured' : '') + '" href="' + linkWhatsPlano(p.nome, p.preco) + '" target="_blank" onclick="prepararPagamento(event, \'' + p.nome + '\', \'' + p.preco + '\')">'
      + '<span class="promo-tag">⏳ Promoção por tempo limitado</span>'
      + (p.destaque ? '<span class="popular-tag">Mais completo</span>' : '')
      + '<div class="plan-left">'
      +   '<div class="plan-icon">' + p.emoji + '</div>'
      +   '<div class="plan-info"><h3>' + p.nome + '</h3><p>' + p.desc + '</p></div>'
      + '</div>'
      + '<div class="plan-price"><div class="amount-old">R$' + p.precoDe + '</div><div class="amount">R$' + p.preco + '</div><div class="period">/mês</div></div>'
      + '</a>';
  }).join('');

  /* === montar página === */
  document.getElementById('app').innerHTML =
    '<div class="profile">'
    + '<div class="avatar">' + c.avatarLetra + '</div>'
    + '<h1>' + c.nome + '</h1>'
    + '<p>' + c.bio + '</p>'
    + '</div>'

    + '<div class="section-label">Planos mensais</div>'
    + planosHTML

    + '<div class="section-label">Como funciona?</div>'
    + '<div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; margin-bottom:10px;">'
    +   '<ol style="font-size:14px; color:var(--text-secondary); line-height:1.8; padding-left:1.1rem; margin:0;">'
    +     '<li>Escolha a lista desejada e realize o pagamento.</li>'
    +     '<li>Após a confirmação do pagamento, você receberá o aplicativo recomendado e o código de acesso.</li>'
    +     '<li>Instale o aplicativo no seu dispositivo e insira o código recebido.</li>'
    +     '<li>Pronto! Sua lista estará liberada para uso imediato.</li>'
    +   '</ol>'
    + '</div>'

    + '<div class="section-label">Compatível com</div>'
    + '<div style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:10px;">'
    +   '<div style="background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-size:14px; display:flex; align-items:center; gap:8px;">📱 Android</div>'
    +   '<div style="background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-size:14px; display:flex; align-items:center; gap:8px;">🍎 iPhone (iOS)</div>'
    +   '<div style="background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-size:14px; display:flex; align-items:center; gap:8px;">📺 Smart TV LG</div>'
    +   '<div style="background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-size:14px; display:flex; align-items:center; gap:8px;">📺 Smart TV Samsung</div>'
    +   '<div style="background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-size:14px; display:flex; align-items:center; gap:8px;">📺 Roku</div>'
    +   '<div style="background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; font-size:14px; display:flex; align-items:center; gap:8px;">📺 TV Box Android</div>'
    + '</div>'

    + '<hr />'
    + '<div class="section-label">Pagamento</div>'
    + '<button class="link-btn" onclick="copyPix()">'
    +   '<div class="link-icon">💠</div><span>Copiar chave Pix manualmente</span>'
    +   '<span class="link-arrow">📋</span>'
    + '</button>'

    + '<hr />'
    + '<div class="section-label">Fale comigo</div>'
    + '<a class="link-btn" href="https://wa.me/' + c.whatsapp + '?text=Ol%C3%A1%2C%20vim%20pelo%20seu%20link%20e%20quero%20assinar%20um%20plano!" target="_blank">'
    +   '<div class="link-icon">💬</div><span>WhatsApp</span><span class="link-arrow">↗</span>'
    + '</a>'

    + '<div class="footer">CleanVids · compartilhe este link com seus clientes</div>';

  /* === funções globais === */
  window.prepararPagamento = function(event, nome, preco) {
    copyText(c.pixChave, 'Chave Pix copiada! Abrindo WhatsApp...');
  };

  window.copyPix = function() {
    copyText(c.pixChave, 'Chave Pix copiada! ✅');
  };
})();
</script>

</body>
</html>
